schema: spec-driven

context: |
  Tech stack: Rust 2021 (rust-version 1.85), Cargo workspace of three crates — `nordocs-core` (rlib engine + binding-agnostic service façade), `nordocs-cli` (binary `ndoc`, a thin adapter over the façade), and `nordocs-ffi` (cdylib, the .NET/C-ABI binding).
  CLI: clap 4 (derive macros).
  Typst integration: typst / typst-library / typst-syntax / typst-pdf / typst-kit / typst-assets, all version 0.14. The Typst compiler is embedded via a hand-rolled `typst::World` over an in-memory virtual FS — no external `typst` binary is ever spawned.
  Markdown: comrak 0.30 (GFM: CommonMark + tables, task lists, strikethrough, footnotes).
  Errors: anyhow for CLI error chains; thiserror for typed library errors (Authoring / Validation / Schema / Compile / FatFile).
  Serialization: serde + serde_json + serde_yaml_ng (JSON `--json` envelope; YAML frontmatter).
  Testing: cargo test + insta (snapshots) + assert_cmd/predicates (CLI E2E).
  Key conventions:
    - No `unwrap` outside `#[cfg(test)]` — library code must use `?` / typed errors.
    - Single binary: all Typst fonts are embedded via `typst-assets`; zero system-font dependency.
    - v1 scope is CLI-first and exports PDF, SVG, and PNG (`preview` stays PDF-only); GUI, HTML export, plugin system, and MCP surface are deferred.
    - `.reference/Typst` is read-only C# source to port from; never modify it.

